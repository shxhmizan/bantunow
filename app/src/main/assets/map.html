<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BantuNow Map</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-dark-forest: #0B1612;
            --surface-pine: #15241C;
            --primary-neon: #00FF66;
            --border-mint: #2A4D3E;
            --text-primary: #FFFFFF;
            --text-secondary: #A3B5AA;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background-color: var(--bg-dark-forest); overflow: hidden; }
        #leaflet-map { height: 100%; width: 100%; }

        /* Custom Leaflet Dark Mode Popup Styling */
        .leaflet-popup-content-wrapper {
            background: var(--surface-pine) !important;
            color: var(--text-primary) !important;
            border: 1px solid var(--border-mint);
            border-radius: 12px;
        }
        .leaflet-popup-tip {
            background: var(--surface-pine) !important;
            border: 1px solid var(--border-mint);
        }
        .popup-btn {
            display: block;
            margin-top: 8px;
            padding: 8px;
            background: var(--primary-neon);
            color: var(--bg-dark-forest);
            text-align: center;
            font-weight: bold;
            border-radius: 6px;
            text-decoration: none;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div id="leaflet-map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="map.js"></script>
</body>
</html>
