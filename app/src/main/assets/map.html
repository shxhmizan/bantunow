<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BantuNow Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-teal: #C4E4E1;
            --brand-dark: #5d3d3a;
            --brand-terracotta: #c15f3c;
            --orange-status: var(--brand-terracotta);
            --surface-light: #FFFFFF;
            --bg-creamy: #F5F2EB;
            --text-charcoal: #1C1C1C;
            --font-heading: 'Playfair Display', serif;
            --font-body: 'Google Sans', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
            font-family: var(--font-body);
        }
        #leaflet-map { height: 100%; width: 100%; }

        .leaflet-popup-content-wrapper {
            border-radius: 24px !important;
            padding: 8px !important;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05) !important;
            background: white !important;
            color: #1C1C1C !important;
            font-family: var(--font-body) !important;
        }
        .leaflet-popup-content { margin: 0 !important; }
        .leaflet-popup-tip { background: white !important; }
        .leaflet-popup-close-button {
            padding: 12px !important;
            color: #EAEAEA !important;
            font-size: 20px !important;
        }

        .custom-div-icon { background: none; border: none; }

        .marker-pin {
            width: 34px;
            height: 34px;
            border-radius: 50% 50% 50% 0;
            background: var(--brand-terracotta);
            position: absolute;
            transform: rotate(-45deg);
            left: 50%;
            top: 50%;
            margin: -22px 0 0 -17px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
            box-shadow: 0 4px 10px rgba(193,95,60,0.4);
            transition: transform 0.2s ease-out;
        }

        .marker-pin img {
            transform: rotate(45deg);
            width: 16px;
            height: 16px;
        }

        .marker-pulse {
            position: absolute;
            width: 30px;
            height: 30px;
            background: rgba(193,95,60,0.3);
            border-radius: 50%;
            left: 50%;
            top: 50%;
            margin: -15px 0 0 -15px;
            z-index: -1;
            animation: pulse 2s infinite;
        }

        .marker-pin.owned {
            background: #2196F3;
            box-shadow: 0 4px 10px rgba(33,150,243,0.4);
        }
        .marker-pulse.owned {
            background: rgba(33,150,243,0.3);
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        /* Control positions */
        .leaflet-top.leaflet-right { top: 70px; }
    </style>
</head>
<body>
    <div id="leaflet-map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="map.js"></script>
</body>
</html>
