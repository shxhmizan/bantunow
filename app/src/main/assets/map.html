<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BantuNow Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --primary-neon: #00FF66;
            --orange-status: #FF7043;
            --surface-light: #FFFFFF;
            --surface-dark: #15241C;
            --text-light: #1A1A1A;
            --text-dark: #FFFFFF;
            --bg-dark-forest: #0B1612;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: transparent; }
        #leaflet-map { height: 100%; width: 100%; }

        .leaflet-popup-content-wrapper {
            border-radius: 24px !important;
            padding: 8px !important;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1) !important;
            background: white !important;
            color: #212121 !important;
        }
        .leaflet-popup-content { margin: 0 !important; }
        .leaflet-popup-tip { background: white !important; }
        .leaflet-popup-close-button {
            padding: 12px !important;
            color: #9e9e9e !important;
            font-size: 20px !important;
        }

        .custom-div-icon { background: none; border: none; }

        /* Control positions */
        .leaflet-top.leaflet-right { top: 70px; }
    </style>
</head>
<body>
    <div id="leaflet-map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="map.js"></script>
</body>
</html>
