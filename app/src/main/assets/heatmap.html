<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BantuNow Heatmap</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html, #heatmap { height: 100%; width: 100%; margin: 0; padding: 0; background: #0B1612; }
    </style>
</head>
<body>
    <div id="heatmap"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script>
        const center = [4.1865, 101.2620];
        const map = L.map('heatmap', { zoomControl: false }).setView(center, 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; CartoDB',
            maxZoom: 20
        }).addTo(map);

        const heatData = [];
        for(let i=0; i<30; i++){
            const lat = center[0] + (Math.random() - 0.5) * 0.1;
            const lng = center[1] + (Math.random() - 0.5) * 0.1;
            heatData.push([lat, lng, Math.random()]);
        }

        L.heatLayer(heatData, {
            radius: 25,
            blur: 15,
            maxZoom: 17,
            gradient: {0.4: 'blue', 0.65: 'lime', 1: 'red'}
        }).addTo(map);
    </script>
</body>
</html>
